<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - D20Masters</title>
    <script>
      (function redirectForSpa() {
        var pathSegments = window.location.pathname.split("/").filter(Boolean);
        var isGithubProjectSite =
          window.location.hostname.endsWith("github.io") && pathSegments.length > 0;
        var basePath = isGithubProjectSite ? "/" + pathSegments[0] + "/" : "/";
        var redirect =
          basePath +
          "?p=" +
          encodeURIComponent(window.location.pathname) +
          (window.location.search || "") +
          (window.location.hash || "");
        window.location.replace(redirect);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      .wrap {
        text-align: center;
        max-width: 520px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 42px;
      }
      p {
        margin: 0 0 18px;
        color: #cbd5e1;
      }
      a {
        display: inline-block;
        padding: 10px 16px;
        border: 1px solid #475569;
        border-radius: 10px;
        color: #fff;
        text-decoration: none;
      }
      a:hover {
        border-color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>404</h1>
      <p>The page you requested does not exist.</p>
      <a href="/">Return to D20Masters</a>
    </div>
  </body>
</html>
